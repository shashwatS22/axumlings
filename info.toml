format_version = 1
welcome_message = """
Welcome to Axumlings!

Small exercises to get you used to Axum, Tokio, and Rust web development.
Run the exercises with: cargo run
"""
final_message = """
Congratulations! You've completed all the Axumlings exercises.
Keep building with Axum and Rust!
"""

